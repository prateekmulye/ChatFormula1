name: Deploy to Render

# Trigger only on commits to main that start with "deploy:"
on:
  push:
    branches:
      - main

jobs:
  check-deploy:
    name: Check if deployment needed
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}

    steps:
      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == deploy:* ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment triggered by commit: $COMMIT_MSG"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping deployment (commit doesn't start with 'deploy:')"
          fi

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: check-deploy
    if: needs.check-deploy.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "🚀 Deployment triggered on Render"

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 60 seconds for deployment to start..."
          sleep 60

      - name: Health check
        run: |
          RENDER_URL="${{ secrets.RENDER_URL }}"
          MAX_RETRIES=15
          RETRY_COUNT=0

          echo "🔍 Starting health checks for $RENDER_URL"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"

            # Try to reach the application
            if curl -f -s -o /dev/null -w "%{http_code}" "$RENDER_URL" | grep -q "200\|301\|302"; then
              echo "✅ Application is responding!"
              echo "🎉 Deployment successful!"
              exit 0
            fi

            echo "⏳ Not ready yet, waiting 20 seconds..."
            sleep 20
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          echo "⚠️  Health check timeout - deployment may still be in progress"
          echo "Check Render dashboard: https://dashboard.render.com"
          exit 0  # Don't fail the workflow

      - name: Deployment summary
        if: always()
        run: |
          echo "📊 Deployment Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📝 Commit: ${{ github.event.head_commit.message }}"
          echo "🔗 URL: ${{ secrets.RENDER_URL }}"
          echo "👤 Author: ${{ github.event.head_commit.author.name }}"
          echo "🕐 Time: $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
