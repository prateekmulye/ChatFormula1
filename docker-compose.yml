# Local development: Postgres 16 (for the Phase 2 gateway) + the agent
# service. The gateway runs natively via `mix` once it lands.
services:
  postgres:
    image: postgres:16
    container_name: chatf1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatf1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatf1_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chatf1_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-chatf1}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
      target: production
    container_name: chatf1-agent
    ports:
      - "${AGENT_PORT:-8000}:8000"
    env_file:
      - path: agent/.env
        required: false # copy agent/.env.example -> agent/.env and add keys
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
    driver: local
