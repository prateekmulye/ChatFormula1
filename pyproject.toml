[build-system]
requires = [ "poetry-core",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "chatformula1"
version = "0.1.0"
description = "AI-powered Formula 1 expert chatbot with RAG architecture"
authors = [ "Prateek Mulye <prateekmulye@gmail.com>",]
readme = "README.md"
license = "MIT"
[[tool.poetry.packages]]
include = "src"

[tool.black]
line-length = 88
target-version = [ "py311", "py312", "py313",]
include = "\\.pyi?$"
extend-exclude = "/(\n  # directories\n  \\.eggs\n  | \\.git\n  | \\.hg\n  | \\.mypy_cache\n  | \\.tox\n  | \\.venv\n  | build\n  | dist\n)/\n"

[tool.ruff]
line-length = 88
target-version = "py311"
select = [ "E", "W", "F", "I", "C", "B", "UP", "ANN", "S", "T20",]
ignore = [ "E501", "B008", "C901", "ANN101", "ANN102", "S101",]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
plugins = [ "pydantic.mypy",]
[[tool.mypy.overrides]]
module = [ "langchain.*", "langgraph.*", "streamlit.*",]
ignore_missing_imports = true

[tool.poetry.dependencies]
python = ">=3.11,<3.14"
python-dotenv = "^1.0.1"
pydantic = "^2.10.6"
pydantic-settings = "^2.7.1"
langchain = "^1.1.0"
langgraph = "^1.0.4"
langchain-openai = "^1.1.0"
langchain-pinecone = "^0.2.13"
langchain-tavily = "^0.2.13"
langchain-community = "^0.4.1"
langchain-text-splitters = "^1.0.0"
langsmith = "^0.3.45"
structlog = "^24.4.0"
python-json-logger = "^3.3.0"
fastapi = "^0.115.14"
streamlit = "^1.51.0"
httpx = "^0.28.1"
tenacity = "^9.0.0"
aiofiles = "^24.1.0"
click = "^8.1.8"
isort = "^7.0.0"

[tool.poetry.scripts]
f1-api = "src.api.main:main"
f1-ui = "src.ui.app:main"
f1-ingest = "src.ingestion.cli:cli"

[tool.ruff.per-file-ignores]
"__init__.py" = [ "F401",]
"tests/**/*.py" = [ "S101", "ANN",]
"src/agent/graph.py" = [ "ANN201", "ANN401", "F821",]
"src/agent/nodes.py" = [ "ANN401",]
"src/api/main.py" = [ "ANN001", "ANN002", "ANN003", "ANN202",]
"src/api/routes/admin.py" = [ "ANN201", "B904",]
"src/api/routes/chat.py" = [ "ANN202", "B904",]
"src/config/logging.py" = [ "ANN401",]
"src/config/settings.py" = [ "ANN001", "ANN206", "S104",]
"src/ingestion/document_processor.py" = [ "S324",]
"src/search/tavily_client.py" = [ "B904",]
"src/security/authentication.py" = [ "ANN001", "ANN201", "ANN204",]
"src/security/middleware.py" = [ "ANN001", "ANN201", "ANN202",]
"src/security/request_signing.py" = [ "ANN201",]
"src/utils/cache.py" = [ "ANN401",]
"src/utils/fallback.py" = [ "ANN401",]
"src/utils/metrics.py" = [ "ANN401", "C401",]
"src/utils/retry.py" = [ "ANN401",]
"src/utils/timing.py" = [ "ANN401", "ANN204",]
"tests/conftest.py" = [ "E721",]
"tests/test_data_loader.py" = [ "S108",]
"tests/test_e2e_user_workflows.py" = [ "S110",]
"tests/test_functionality_preservation.py" = [ "W293", "F841",]
"tests/test_integration_agent.py" = [ "UP038",]
"tests/test_security.py" = [ "S106",]

[tool.pytest.ini_options]
testpaths = [ "tests",]
python_files = [ "test_*.py",]
python_classes = [ "Test*",]
python_functions = [ "test_*",]
asyncio_mode = "auto"
addopts = [ "-v", "--strict-markers", "--tb=short", "--cov=src", "--cov-report=term-missing", "--cov-report=html",]
markers = [ "unit: Unit tests", "integration: Integration tests", "e2e: End-to-end tests", "slow: Slow running tests",]

[tool.coverage.run]
source = [ "src",]
omit = [ "tests/*", "**/__pycache__/*",]

[tool.coverage.report]
exclude_lines = [ "pragma: no cover", "def __repr__", "raise AssertionError", "raise NotImplementedError", "if __name__ == .__main__.:", "if TYPE_CHECKING:",]

[tool.poetry.dependencies.pinecone]
extras = [ "asyncio",]
version = "^7.3.0"

[tool.poetry.dependencies.uvicorn]
extras = [ "standard",]
version = "^0.34.3"

[tool.poetry.group.dev.dependencies]
pytest = "^8.4.2"
pytest-asyncio = "^0.24.0"
pytest-cov = "^6.3.0"
pytest-mock = "^3.15.1"
black = "^25.11.0"
ruff = "^0.8.6"
mypy = "^1.19.0"
pre-commit = "^4.5.0"
types-aiofiles = "^24.1.0.20250822"
